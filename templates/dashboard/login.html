<!DOCTYPE html>
{% load static %}
<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">
  <title>Otika - Admin Dashboard Template</title>
   <link rel="stylesheet" href="{% static 'assets2/assets/css/app.min.css' %}">
  <!-- Template CSS -->
  <link rel="stylesheet" href="{% static 'assets2/assets/css/style.css' %}">
  <link rel="stylesheet" href="{% static 'assets2/assets/css/components.css' %}">
    <link rel="stylesheet" href="{% static 'assets2/assets/bundles/izitoast/css/iziToast.min.css' %}">

  <!-- Custom style CSS -->
  <link rel="stylesheet" href="{% static 'assets2/assets/css/custom.css' %}">
  <link rel='shortcut icon' type='image/x-icon' href="{% static 'assets2/assets/img/favicon.ico' %}" />
    <link rel="stylesheet" href="{% static 'assets2/assets/bundles/summernote/summernote-bs4.css' %}">
  <link rel="stylesheet" href="{% static 'assets2/assets/bundles/jquery-selectric/selectric.css' %}">
  <link rel="stylesheet" href="{% static 'assets2/assets/bundles/bootstrap-tagsinput/dist/bootstrap-tagsinput.css' %}">
    <link rel="stylesheet" href="{% static 'assets2/assets/bundles/pretty-checkbox/pretty-checkbox.min.css' %}">
  <link rel="stylesheet" href="{% static 'assets2/assets/bundles/prism/prism.css' %}">
</head>

<body>
  <div class="loader"></div>
  <div id="app">
    <section class="section">
      <div class="container mt-5">
        <div class="row">
          <div class="col-12 col-sm-8 offset-sm-2 col-md-6 offset-md-3 col-lg-6 offset-lg-3 col-xl-4 offset-xl-4">
            <div class="card card-primary">
              <div class="card-header">
                <h4>Login</h4>
              </div>
              <div class="card-body">
                <form method="POST" class="needs-validation" novalidate="">{% csrf_token %}
                  <div class="form-group">
                    <label for="email">Username</label>
                    <input id="email" type="text" class="form-control" name="username" tabindex="1" required autofocus>
                    <div class="invalid-feedback">
                      Please fill in your email
                    </div>
                  </div>
                  <div class="form-group">
                    <div class="d-block">
                      <label for="password" class="control-label">Password</label>
                      <div class="float-right">
                        <a href="auth-forgot-password.html" class="text-small">
                          Forgot Password?
                        </a>
                      </div>
                    </div>
                    <input id="password" type="password" class="form-control" name="password" tabindex="2" required>
                    <div class="invalid-feedback">
                      please fill in your password
                    </div>
                  </div>
                  <div class="form-group">
                    <div class="custom-control custom-checkbox">
                      <input type="checkbox" name="remember" class="custom-control-input" tabindex="3" id="remember-me">
                      <label class="custom-control-label" for="remember-me">Remember Me</label>
                    </div>
                  </div>
                  <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-lg btn-block" tabindex="4">
                      Login
                    </button>
                  </div>
                </form>

              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
 <!-- General JS Scripts -->
  <script src="{% static 'assets2/assets/js/app.min.js' %}"></script>
  <!-- JS Libraies -->
  <script src="{% static 'assets2/assets/bundles/apexcharts/apexcharts.min.js' %}"></script>
  <!-- Page Specific JS File -->
  <script src="{% static 'assets2/assets/js/page/index.js' %}"></script>
  <!-- Template JS File -->
  <script src="{% static 'assets2/assets/js/scripts.js' %}"></script>
  <!-- Custom JS File -->
  <script src="{% static 'assets2/assets/js/custom.js' %}"></script>
  <script src="{% static 'assets2/assets/bundles/summernote/summernote-bs4.js' %}"></script>
  <script src="{% static 'assets2/assets/bundles/jquery-selectric/jquery.selectric.min.js' %}"></script>
  <script src="{% static 'assets2/assets/bundles/upload-preview/assets/js/jquery.uploadPreview.min.js' %}"></script>
  <script src="{% static 'assets2/assets/bundles/bootstrap-tagsinput/dist/bootstrap-tagsinput.min.js' %}"></script>
  <!-- Page Specific JS File -->
  <script src="{% static 'assets2/assets/js/page/create-post.js' %}"></script>
  <script src="{% static 'assets2/assets/bundles/prism/prism.js' %}"></script>
  <script src="{% static 'assets2/assets/bundles/izitoast/js/iziToast.min.js' %}"></script>
  <!-- Page Specific JS File -->
  <script src="{% static 'assets2/assets/js/page/toastr.js' %}"></script>

</body>


<!-- auth-login.html  21 Nov 2019 03:49:32 GMT -->
</html>
